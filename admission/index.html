<!-- HERO -->
<section class="hero">
<h1>Course Enquiry</h1>
<p>Fill the form and our team will contact you with course details.</p>
</section>
<!-- ENQUIRY FORM -->
<section class="form-section">
<div class="form-box">

<h2>Student Enquiry Form</h2>

<form>

<div class="form-row">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="tel" placeholder="+91 XXXXX XXXXX" required>
</div>

</div>


<div class="form-row">

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter email">
</div>

<div class="input-group">
<label>Interested Course</label>

<select required>

<option>Select Course</option>
<option>Basic Computer Course</option>
<option>Web Designing</option>
<option>Tally with GST</option>
<option>Graphic Designing</option>
<option>Python Programming</option>
<option>Digital Marketing</option>

</select>

</div>

</div>


<div class="input-group">
<label>Your Message</label>
<textarea rows="4" placeholder="Ask your course related question"></textarea>
</div>


<button class="btn">Submit Enquiry</button>

</form>

</div>

</section>
